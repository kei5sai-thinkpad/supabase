<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Storage掲示板</title>
<style>
body { font-family: sans-serif; background:#1e1e2f; color:#fff; text-align:center; padding:20px; }
textarea,input { width:100%; margin:5px 0; padding:8px; border-radius:6px; border:none; background:rgba(255,255,255,0.1); color:#fff; }
button { padding:8px 12px; border:none; border-radius:6px; cursor:pointer; background:#ff416c; color:#fff; font-weight:bold; }
.post { background: rgba(255,255,255,0.1); padding:10px; margin:10px 0; border-radius:8px; position: relative; }
.post button.delete-btn { position:absolute; top:5px; right:5px; background:red; padding:3px 6px; font-size:0.7em; border-radius:4px; }
</style>
</head>
<body>
<h1>掲示板（Storage版）</h1>
<form id="postForm">
<textarea name="content" placeholder="内容を入力" required></textarea><br>
<input type="text" name="username" placeholder="名前"><br>
<input type="password" name="password" placeholder="削除パスワード" required><br>
<button type="submit">投稿</button>
</form>
<div id="postsContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===== Supabase 設定 =====
const SUPABASE_URL = 'https://cbeqemihvwwcrzppaitq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_1BjddSqr8rwahta6ZBJ9tw_CIOyuNUo';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const bucket = 'public'; // 公開バケット名
const fileName = 'posts.json';

const form = document.getElementById('postForm');
const postsContainer = document.getElementById('postsContainer');

// 投稿データ取得
async function loadPosts() {
  let posts = [];
  const { data, error } = await supabaseClient.storage.from(bucket).download(fileName);
  if (data) {
    const text = await data.text();
    try { posts = JSON.parse(text); } catch(e){ posts = []; }
  }
  renderPosts(posts);
}

// 投稿レンダリング
function renderPosts(posts) {
  postsContainer.innerHTML = '';
  posts.forEach(p => {
    const div = document.createElement('div');
    div.className = 'post';
    div.id = `post-${p.id}`;
    div.innerHTML = `
      <b>${p.username || '名無し'}</b>
      <p>${p.content}</p>
      <button class="delete-btn" data-id="${p.id}">削除</button>
    `;
    postsContainer.appendChild(div);

    div.querySelector('.delete-btn').addEventListener('click', async () => {
      const pwd = prompt('削除パスワードを入力してください');
      if (!pwd) return;
      if (pwd !== p.password) { alert('パスワード違います'); return; }
      await deletePost(p.id);
    });
  });
}

// 投稿追加
form.addEventListener('submit', async e => {
  e.preventDefault();
  const content = form.content.value;
  const username = form.username.value || '名無し';
  const password = form.password.value;

  const { data, error } = await supabaseClient.storage.from(bucket).download(fileName);
  let posts = [];
  if (data) {
    const text = await data.text();
    try { posts = JSON.parse(text); } catch(e){ posts = []; }
  }

  posts.unshift({ id: Date.now(), content, username, password });
  await supabaseClient.storage.from(bucket).upload(fileName, JSON.stringify(posts), { upsert: true });
  form.reset();
  loadPosts();
});

// 投稿削除
async function deletePost(id) {
  const { data, error } = await supabaseClient.storage.from(bucket).download(fileName);
  if (!data) return;
  const text = await data.text();
  let posts = [];
  try { posts = JSON.parse(text); } catch(e){ posts = []; }
  posts = posts.filter(p => p.id !== id);
  await supabaseClient.storage.from(bucket).upload(fileName, JSON.stringify(posts), { upsert: true });
  loadPosts();
}

loadPosts();
</script>
</body>
</html>
