<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>掲示板</title>
<style>
body {
  margin: 0;
  font-family: "Segoe UI", "Noto Sans JP", sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #2b2b45);
  color: #fff;
}
.container {
  max-width: 700px;
  margin: 40px auto;
  padding: 20px;
}
h1 {
  text-align: center;
  font-size: 2.2em;
  margin-bottom: 20px;
  text-shadow: 0 2px 6px rgba(0,0,0,0.5);
}
form {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
  margin-bottom: 20px;
}
textarea, input {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
}
textarea { height: 80px; resize: none; }
button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  background: linear-gradient(135deg, #ff416c, #ff4b2b);
  border: none;
  border-radius: 8px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}
button:hover { transform: scale(1.05); }
button:focus { outline: none; box-shadow: 0 0 10px #ff4b2b; }
.post {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
  backdrop-filter: blur(8px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  transition: 0.3s;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 0.5s forwards;
  position: relative;
}
.post:hover { transform: translateY(-3px); }
.post b { color: #ffcc70; }
.post span { font-size: 0.8em; color: #ccc; float: right; }
.post p { margin-top: 5px; word-break: break-word; }
.post button.delete-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(255,0,0,0.6);
  width: auto;
  padding: 5px 10px;
  font-size: 0.7em;
  border-radius: 6px;
}
a { color: #4fc3f7; }
@keyframes fadeInUp {
  to { opacity: 1; transform: translateY(0); }
}
@media (max-width: 500px) {
  .container { margin: 20px; padding: 15px; }
  h1 { font-size: 1.8em; }
}
</style>
</head>
<body>
<div class="container">
<h1>掲示板</h1>
<form id="postForm">
<textarea name="content" required placeholder="内容を入力"></textarea><br>
<input type="text" name="username" placeholder="名前"><br>
<input type="password" name="password" placeholder="削除パスワード" required><br>
<button type="submit">投稿</button>
</form>
<hr>
<div id="postsContainer"></div>

<!-- Supabase ライブラリは1回だけ読み込む -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ===== Supabase 設定 =====
const supabaseUrl = 'https://cbeqemihvwwcrzppaitq.supabase.co';       // ここに自分のプロジェクトURL
const supabaseKey = 'sb_publishable_1BjddSqr8rwahta6ZBJ9tw_CIOyuNUo';   // ここにPublishable Key
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

const form = document.getElementById('postForm');
const postsContainer = document.getElementById('postsContainer');

// 投稿一覧表示
async function loadPosts() {
  const { data, error } = await supabaseClient
    .from('posts')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) return console.error(error);

  postsContainer.innerHTML = '';
  data.forEach(post => {
    const div = document.createElement('div');
    div.className = 'post';
    div.id = `post-${post.id}`;
    div.innerHTML = `
      <b>${post.username || '名無し'}</b>
      <span>${new Date(post.created_at).toLocaleString()}</span>
      <p>${post.linked_content}</p>
      <button class="delete-btn" data-id="${post.id}">削除</button>
    `;
    postsContainer.appendChild(div);

    // 削除ボタン
    div.querySelector('.delete-btn').addEventListener('click', async () => {
      const password = prompt('削除パスワードを入力してください');
      if (!password) return;
      const { data: delData, error: delError } = await supabaseClient
        .from('posts')
        .delete()
        .eq('id', post.id)
        .eq('password', password);

      if (delError) alert('削除に失敗: ' + delError.message);
      else if (delData.length === 0) alert('パスワードが違います');
      else div.remove();
    });
  });
}

// 投稿フォーム送信
form.addEventListener('submit', async e => {
  e.preventDefault();
  const formData = new FormData(form);
  const content = formData.get('content');
  const username = formData.get('username') || '名無し';
  const password = formData.get('password');

  const { data, error } = await supabaseClient
    .from('posts')
    .insert([{ linked_content: content, username, password }]);

  if (error) alert('投稿に失敗: ' + error.message);
  else {
    form.reset();
    loadPosts();
  }
});

// 初回ロード
loadPosts();
</script>
</div>
</body>
</html>
