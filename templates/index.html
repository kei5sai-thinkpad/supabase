<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>掲示板</title>
<style>
body { font-family: sans-serif; background: #f5f5f5; }
.container { max-width: 700px; margin: auto; background: white; padding: 20px; }
.post { border-bottom: 1px solid #ccc; padding: 10px; }
textarea { width: 100%; height: 80px; }
</style>
</head>
<body>

<div class="container">
<h1>掲示板</h1>

<form method="POST">
<textarea name="content" required></textarea><br>
<input type="text" name="username" placeholder="名前"><br>
<input type="password" name="password" placeholder="削除パスワード" required><br>
<button type="submit">投稿</button>
</form>

<hr>

{% for post in posts %}
<div class="post">
<b>{{ post.username }}</b>
<span>{{ post.created_at }}</span>
<p>{{ post.linked_content | safe }}</p>
</div>
{% endfor %}

</div>

</body>
</html>
