<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>掲示板</title>
<style>
/* ===== 全体 ===== */
body {
  margin: 0;
  font-family: "Segoe UI", "Noto Sans JP", sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #2b2b45);
  color: #fff;
}

.container {
  max-width: 700px;
  margin: 40px auto;
  padding: 20px;
}

/* ===== 見出し ===== */
h1 {
  text-align: center;
  font-size: 2.2em;
  margin-bottom: 20px;
  text-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

/* ===== フォーム ===== */
form {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
  margin-bottom: 20px;
}

textarea, input {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

textarea {
  height: 80px;
  resize: none;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  background: linear-gradient(135deg, #ff416c, #ff4b2b);
  border: none;
  border-radius: 8px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

button:focus {
  outline: none;
  box-shadow: 0 0 10px #ff4b2b;
}

/* ===== 投稿カード ===== */
.post {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
  backdrop-filter: blur(8px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  transition: 0.3s;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 0.5s forwards;
}

.post:hover {
  transform: translateY(-3px);
}

.post b {
  color: #ffcc70;
}

.post span {
  font-size: 0.8em;
  color: #ccc;
  float: right;
}

.post p {
  margin-top: 5px;
  word-break: break-word;
}

a {
  color: #4fc3f7;
}

/* ===== アニメーション ===== */
@keyframes fadeInUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ===== レスポンシブ ===== */
@media (max-width: 500px) {
  .container {
    margin: 20px;
    padding: 15px;
  }

  h1 {
    font-size: 1.8em;
  }
}
</style>
</head>
<body>

<div class="container">
<h1>掲示板</h1>

<form method="POST">
<textarea name="content" required placeholder="内容を入力"></textarea><br>
<input type="text" name="username" placeholder="名前"><br>
<input type="password" name="password" placeholder="削除パスワード" required><br>
<button type="submit">投稿</button>
</form>

<hr>

{% for post in posts %}
<div class="post">
<b>{{ post.username }}</b>
<span>{{ post.created_at }}</span>
<p>{{ post.linked_content | safe }}</p>
</div>
{% endfor %}

</div>

</body>
</html>
